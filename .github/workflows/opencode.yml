name: opencode

on:
  schedule:
    - cron: '0 0 * * *' # 每天北京时间上午8点 (UTC 0:00) 触发
  workflow_dispatch: # 添加手动触发
    inputs:
      prompt:
        description: 'Custom prompt for the agent (leave empty for daily sync)'
        required: false
        type: string
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  pull_request_target: # 关键修复：使用 pull_request_target 以获得写权限
    types: [opened, synchronize]

jobs:
  check-upstream:
    name: Check Upstream for Updates
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    outputs:
      has_updates: ${{ steps.check.outputs.has_updates }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Check for updates
        id: check
        run: |
          git remote add upstream https://github.com/WildKernels/OnePlus_KernelSU_SUSFS.git
          git fetch upstream main
          LOCAL_COMMIT=$(git rev-parse HEAD)
          UPSTREAM_COMMIT=$(git rev-parse upstream/main)
          echo "Local commit: $LOCAL_COMMIT"
          echo "Upstream commit: $UPSTREAM_COMMIT"
          
          # Check if upstream is ahead
          if ! git merge-base --is-ancestor $UPSTREAM_COMMIT $LOCAL_COMMIT; then
            echo "Upstream has new commits."
            echo "has_updates=true" >> "$GITHUB_OUTPUT"
          else
            echo "No new updates from upstream."
            echo "has_updates=false" >> "$GITHUB_OUTPUT"
          fi

  opencode:
    name: Run Opencode Agent
    needs: [check-upstream]
    # 如果是定时触发，只有在检查到有更新时才运行；手动触发或评论触发则直接运行
    if: |
      always() && 
      (
        (github.event_name == 'schedule' && needs.check-upstream.result == 'success' && needs.check-upstream.outputs.has_updates == 'true') ||
        github.event_name == 'workflow_dispatch' ||
        (github.event_name == 'issue_comment' && (contains(github.event.comment.body, ' /oc') || startsWith(github.event.comment.body, '/oc') || contains(github.event.comment.body, ' /opencode') || startsWith(github.event.comment.body, '/opencode'))) ||
        (github.event_name == 'pull_request_review_comment' && (contains(github.event.comment.body, ' /oc') || startsWith(github.event.comment.body, '/oc') || contains(github.event.comment.body, ' /opencode') || startsWith(github.event.comment.body, '/opencode')))
      )
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: write
      pull-requests: write
      issues: write
      actions: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          # Disable persisting credentials to prevent conflicts with GITHUB_TOKEN environment variable
          persist-credentials: false

      - name: Prepare Prompt
        id: prep
        run: |
          # 1. Define Common Blocks
          cat << 'EOF' > guidelines.txt
          STRICT WORKFLOW RULE (CRITICAL): 
          - You must remain on the CURRENT branch. Do not switch to or create any other branches.
          - STRICT SECURITY RULE: Under NO circumstances are you allowed to modify the 'main' branch or any other existing permanent branches directly. 
          - Do not attempt to manually create Pull Requests or push code using external command-line tools.
          - WHY: The system manages a specialized temporary branch and the necessary authentication. Deviating from the current branch or attempting to modify protected branches will cause the automation to fail.
          - YOUR TASK: Simply perform the requested modifications on the CURRENT temporary branch. Stay exactly where you are.

          # Project Maintenance & Safety Guidelines (OnePlus_KernelSU_SUSFS)
          You must strictly adhere to the following guidelines for ALL code modifications.

          ## 🚫 Strictly Forbidden
          1. Reject Normalize Scheme: PROHIBITED to introduce any code containing the keyword `normalized` in `.github/workflows/build-kernel-release.yml`.
          2. Reject KernelSU-Next (KSUN) and WildKSU: PROHIBITED to add `KSUN` or `WildKSU` to the `ksu_type` options in `.github/actions/action.yml`.
          3. Preserve Telegram Links: PROHIBITED to replace original links (`t.me/huangdihd`, `t.me/huangdihd_wildkernel`) in `README.md`.
          4. Preserve AnyKernel3 Repo: AnyKernel3 URLs in `action.yml` and `manifests/**/*.xml` MUST point to `https://github.com/huangdihd/AnyKernel3`.
          5. Reject WILD Suffix: `"uname"` in configs MUST be `"OP-RESUKISU"`. Fallback LOCALVERSION must not be `-OP-WILD`.
          6. Preserve USB DWC3 & OTG Support: PROHIBITED to remove or disable this step in `action.yml`.
          7. Preserve Correct ReSukiSU Repository: MUST use `https://github.com/ReSukiSU/ReSukiSU`.

          ## 🛠️ Audit Checklist
          Before finishing, you MUST verify:
          1. No "KSUN" or "WildKSU" in build scripts.
          2. No "normalized" in release workflows.
          3. ReSukiSU steps are intact.
          4. Telegram links and AnyKernel3 URLs are correct.
          5. "Add USB DWC3 & OTG Support" step exists in action.yml.
          EOF

          # 2. Logic based on Trigger
          if [[ "${{ github.event_name }}" == "schedule" || ( "${{ github.event_name }}" == "workflow_dispatch" && "${{ github.event.inputs.prompt }}" == "" ) ]]; then
            # UPSTREAM SYNC LOGIC
            {
              echo "Check for upstream repository modifications from https://github.com/WildKernels/OnePlus_KernelSU_SUSFS."
              echo "If there are new updates, YOU MUST integrate them. Use the following command to fetch safely:"
              echo "\`git -c http.extraHeader=\"\" fetch --no-tags https://github.com/WildKernels/OnePlus_KernelSU_SUSFS.git main:upstream-main\`"
              echo "Then, use standard \`git merge upstream-main\` into the current branch."
              echo ""
              cat guidelines.txt
              echo ""
              echo "## ⚠️ Abort Condition"
              echo "If upstream modifications are incomplete or broken, actively ABANDON this sync and leave a comment."
            } > final_prompt.txt
          elif [[ "${{ github.event_name }}" == "issue_comment" || "${{ github.event_name }}" == "pull_request_review_comment" ]]; then
            # INTERACTIVE COMMENT LOGIC
            {
              echo "You are responding to a user request in a Pull Request comment."
              echo "Carefully implement the requested changes, but YOU MUST strictly follow the project safety guidelines below:"
              echo ""
              cat guidelines.txt
            } > final_prompt.txt
          elif [[ "${{ github.event_name }}" == "workflow_dispatch" && "${{ github.event.inputs.prompt }}" != "" ]]; then
            # CUSTOM DISPATCH LOGIC
            {
              echo "${{ github.event.inputs.prompt }}"
              echo ""
              echo "---"
              echo "IMPORTANT: While performing the task above, you MUST adhere to the project safety guidelines:"
              echo ""
              cat guidelines.txt
            } > final_prompt.txt
          else
            echo "" > final_prompt.txt
          fi

          # 3. Output the result
          {
            echo 'prompt<<EOF'
            cat final_prompt.txt
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Run opencode
        uses: anomalyco/opencode/github@latest
        env:
          XIAOMI_API_KEY: ${{ secrets.XIAOMI_API_KEY }}
          # Using GITHUB_TOKEN to ensure permission assertion passes.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          model: xiaomi-token-plan-cn/mimo-v2-pro
          prompt: ${{ steps.prep.outputs.prompt }}

  set-matrix:
    name: Generate Test Matrix
    # 针对 pull_request_target 进行适配
    if: github.event_name == 'pull_request_target' && startsWith(github.event.pull_request.head.ref, 'opencode/')
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6
        with:
          # 在 pull_request_target 中必须显式检出 PR 的 head 才能测试 PR 代码
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Generate build matrix
        id: set-matrix
        shell: bash
        run: |
          echo "[" > matrix.json
          mapfile -t all_json_files < <(find configs/ -name "*.json" -print0 | xargs -0 -n1)
          for i in "${!all_json_files[@]}"; do
            file="${all_json_files[$i]}"
            if [ -f "$file" ]; then
              jq -r '.' "$file" >> matrix.json
              if [ $((i+1)) -lt ${#all_json_files[@]} ]; then
                echo "," >> matrix.json
              fi
            fi
          done
          echo "]" >> matrix.json
          
          filtered=$(jq -c '.' matrix.json)
          wrapped=$(jq -n --argjson items "$filtered" '{ include: $items }')
          echo "matrix=$(jq -c . <<< "$wrapped")" >> "$GITHUB_OUTPUT"

  test-build:
    name: Build (${{ matrix.model }}, ${{ matrix.os_version }}, ${{ matrix.kernel_version }})
    needs: [set-matrix]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.set-matrix.outputs.matrix) }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Install Minimal Dependencies
        run: |
          sudo apt-get update -qq
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends \
            git curl ca-certificates build-essential clang lld flex bison \
            libelf-dev libssl-dev libncurses-dev zlib1g-dev liblz4-tool \
            libxml2-utils rsync rsync unzip dwarves file python3 bc dos2unix kmod libdw-dev elfutils pigz jq

      - name: Prepare op_config_json
        id: prepare_config
        shell: bash
        run: |
          echo "config_json=$(jq -nc --argjson m '${{ toJSON(matrix) }}' '$m')" >> "$GITHUB_OUTPUT"

      - name: Test Build Kernel
        id: build
        uses: ./.github/actions/build-kernel
        with:
          op_config_json: ${{ steps.prepare_config.outputs.config_json }}
          ksu_type: "ReSukiSU"
          ksu_branch_or_hash: "main"
          susfs_commit_hash_or_branch: "gki-${{ matrix.android_version }}-${{ matrix.kernel_version }}"
          optimize_level: "O2"
          build_timestamp: ""
          clean: true
          debug: false
          github_token: ${{ secrets.GITHUB_TOKEN }}

  report-test-result:
    name: Report and Auto-Fix
    needs: [test-build]
    if: always() && github.event_name == 'pull_request_target' && startsWith(github.event.pull_request.head.ref, 'opencode/')
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: write
      pull-requests: write
      issues: write
      actions: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          persist-credentials: false

      - name: Prepare TG Message
        id: prep-msg
        if: always()
        shell: bash
        run: |
          TEST_BUILD_RESULT="${{ needs.test-build.result }}"
          PR_URL="${{ github.event.pull_request.html_url }}"
          PR_NUM="${{ github.event.pull_request.number }}"
          
          EMOJI="✅"
          if [ "$TEST_BUILD_RESULT" != "success" ]; then EMOJI="❌"; fi
          
          {
            echo "msg<<EOF"
            echo "${EMOJI} <b>Opencode PR Test Build Finished</b>"
            echo "━━━━━━━━━━━━━━━━━━"
            echo "<b>Result:</b> <code>${TEST_BUILD_RESULT}</code>"
            echo "<b>PR:</b> <a href=\"${PR_URL}\">#${PR_NUM}</a>"
            echo "━━━━━━━━━━━━━━━━━━"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Send TG Progress
        if: always()
        continue-on-error: true
        env:
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_TEST_CHAT_ID || secrets.TG_CHAT_ID }}
        run: |
          if [ -z "$TG_BOT_TOKEN" ] || [ -z "$TG_CHAT_ID" ]; then
            echo "Telegram secrets not configured!"
            exit 0
          fi
          
          MSG_TEXT="${{ steps.prep-msg.outputs.msg }}"
          IFS=' ,' read -r -a CHAT_IDS <<< "$TG_CHAT_ID"
          
          for ID in "${CHAT_IDS[@]}"; do
            if [ -z "$ID" ]; then continue; fi
            PAYLOAD=$(jq -n --arg chat_id "$ID" --arg text "$MSG_TEXT" \
              '{chat_id: $chat_id, parse_mode: "HTML", disable_web_page_preview: true, text: $text}')
            curl -s -X POST "https://api.telegram.org/bot${TG_BOT_TOKEN}/sendMessage" \
              -H "Content-Type: application/json" -d "$PAYLOAD" > /dev/null
          done

      - name: Run opencode to fix build
        if: needs.test-build.result != 'success'
        uses: anomalyco/opencode/github@latest
        env:
          XIAOMI_API_KEY: ${{ secrets.XIAOMI_API_KEY }}
          # 在 pull_request_target 下，这个 token 将拥有真实的写权限
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          model: xiaomi-token-plan-cn/mimo-v2-pro
          prompt: "The matrix test build failed for one or more devices. Please check the GitHub Actions logs for the failed 'test-build' jobs to identify the compilation errors. Fix the code to resolve these compilation errors and push the updates to the PR branch. \n\nIMPORTANT RE-TRIGGER RULE: Even if you find no bugs to fix or your investigation results in no code changes, YOU MUST push a commit to the PR branch to re-trigger the verification. Use `git commit --allow-empty -m 'chore: trigger re-verification'` if necessary. Verification MUST run again.\n\nIF YOU ENCOUNTER A TOOLCHAIN CACHE ERROR (e.g., '[FATAL ERROR] Toolchain AnyKernel3... NOT FOUND in GitHub Release cache!'):\nThis means a newly added toolchain hasn't been mirrored to GitHub releases yet. You MUST manually trigger the mirror workflow for your PR branch using the following command in your terminal:\n`gh workflow run mirror-toolchains.yml --ref <your-pr-branch-name>`\nWait a minute for it to complete, and then trigger a new test build by pushing an empty commit."

      - name: Force Rerun on Sync (Fallback)
        if: always() && needs.test-build.result != 'success'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh run rerun ${{ github.run_id }} --failed || echo "Rerun skipped or failed"

      - name: Fail the workflow
        if: needs.test-build.result != 'success'
        run: exit 1
